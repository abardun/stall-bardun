<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stall Bardun AB</title>
  <meta name="description" content="Stall Bardun AB — professional horse ownership, racing and training. Bardun Stall AB — professionellt hästägande, tävling och träning." />

  <!-- Signal both language alternates to search engines -->
  <link rel="alternate" hreflang="sv" href="https://stallbardun.com/sv/" />
  <link rel="alternate" hreflang="en" href="https://stallbardun.com/en/" />
  <link rel="alternate" hreflang="x-default" href="https://stallbardun.com/sv/" />
  <link rel="canonical" href="https://stallbardun.com/" />

  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />

  <!-- Immediate client-side redirect -->
  <script>
    (function () {
      try {
        // 1. Manual override via localStorage takes precedence
        var stored = null;
        try { stored = localStorage.getItem('lang'); } catch (_) {}
        if (stored === 'sv' || stored === 'en') {
          window.location.replace('/' + stored + '/');
          return;
        }

        // 2. Detect browser languages
        var langs = (navigator.languages && navigator.languages.length)
          ? navigator.languages
          : [navigator.language || navigator.userLanguage || ''];

        // Swedish-speaking audience: sv (Sweden) + no/nb/nn (Norway - high SE overlap)
        var swedishLocales = /^(sv|no|nb|nn)(-|$)/i;
        var isSwedish = false;
        for (var i = 0; i < langs.length; i++) {
          if (swedishLocales.test(langs[i])) { isSwedish = true; break; }
        }

        window.location.replace(isSwedish ? '/sv/' : '/en/');
      } catch (err) {
        // 3. Any failure → Swedish fallback
        window.location.replace('/sv/');
      }
    })();
  </script>

  <!-- Fallback meta refresh (no JS) — defaults to Swedish -->
  <meta http-equiv="refresh" content="1;url=/sv/" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .panel { max-width: 420px; width: 100%; text-align: center; }
    .logo { width: 80px; height: auto; margin-bottom: 28px; opacity: 0.9; }
    h1 {
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 0.02em;
      margin-bottom: 20px;
      color: #fff;
    }
    p { color: #999; font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
    .choices { display: flex; gap: 12px; justify-content: center; }
    .choice {
      flex: 1;
      padding: 14px 20px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #e8e8e8;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }
    .choice:hover {
      border-color: #c9a961;
      color: #c9a961;
      background: rgba(201,169,97,0.05);
    }
  </style>
</head>
<body>
  <!-- Shown only if JS disabled (meta refresh takes over after 1s) -->
  <div class="panel">
    <img src="/logo.png" alt="Stall Bardun AB" class="logo" />
    <h1>Stall Bardun AB</h1>
    <p>Välj språk / Choose language</p>
    <div class="choices">
      <a href="/sv/" class="choice">Svenska</a>
      <a href="/en/" class="choice">English</a>
    </div>
  </div>
</body>
</html>
