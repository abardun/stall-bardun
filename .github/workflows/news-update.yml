name: Update News Feed

on:
  schedule:
    # Every day at 06:00 UTC (07:00 CET / 08:00 CEST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run news updater
        run: node news-update.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.js
          if git diff --cached --quiet; then
            echo "No changes to news.js — skipping commit."
          else
            git commit -m "chore: auto-update news feed $(date -u +%Y-%m-%d)"
            git push
          fi
